<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Received | Silverback Tech Repairs</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="shortcut icon" href="assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --black:#15161a;--ink:#23252b;--steel:#5d626c;--silver:#9298a3;
  --mist:#f4f5f7;--paper:#ffffff;--line:#e7e9ee;--muted:#6b7079;
  --shadow:0 10px 40px -18px rgba(21,22,26,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--black);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
h1{font-family:'Sora',sans-serif;line-height:1.2;letter-spacing:-.02em}
a{text-decoration:none;color:inherit}
.container{max-width:560px;margin:0 auto;padding:0 24px;width:100%}
.top{padding:32px 0}
.logo img{height:60px;width:auto}
.main{flex:1;display:flex;align-items:center;padding:40px 0 80px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:48px 36px;text-align:center;width:100%}
.check{width:64px;height:64px;border-radius:50%;background:rgba(82,196,124,.15);color:#52c47c;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 22px}
.card h1{color:#fff;font-size:clamp(1.5rem,4vw,2rem);font-weight:700;margin-bottom:12px}
.card p{color:var(--silver);font-size:1rem;margin-bottom:30px}
.btn{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-family:'Sora';font-weight:600;font-size:.95rem;padding:14px 26px;border-radius:50px;transition:transform .2s,box-shadow .2s;width:100%;justify-content:center}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:#fff;color:var(--black);margin-bottom:14px}
.btn-primary:hover{box-shadow:0 12px 28px -14px rgba(255,255,255,.5)}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.25)}
.btn-outline:hover{background:rgba(255,255,255,.08);border-color:#fff}
.phone{margin-top:26px;color:var(--silver);font-size:.9rem}
.phone a{color:#fff;font-weight:600}
</style>
</head>
<body>
<div class="container top">
  <a href="index.html" class="logo"><img src="assets/images/white_logo.png" alt="Silverback Tech Repairs" onerror="this.onerror=null;this.src='assets/images/logo_dark.png'"></a>
</div>
<div class="main">
  <div class="container">
    <div class="card">
      <div class="check"><i class="fas fa-check"></i></div>
      <h1>Request Received!</h1>
      <p>We'll review your request and email you shortly with next steps — a shipping label, or a local drop-off appointment.</p>
      <a href="index.html#quote" class="btn btn-primary"><i class="fas fa-plus"></i> Submit Another Request</a>
      <a href="index.html" class="btn btn-outline">Back to Home</a>
      <div class="phone">Need to reach us now? Call or text <a href="tel:+12249669575">(224) 966-9575</a></div>
    </div>
  </div>
</div>
</body>
</html>
